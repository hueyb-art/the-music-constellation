<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Jazz Constellation — 3D prototype</title>
<style>
  :root{--gold:#e0b15a;--ink:#f3ece0;--muted:#9a9088}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05040a;overflow:hidden;font-family:"Helvetica Neue",Arial,sans-serif;color:var(--ink)}
  #c{display:block;width:100vw;height:100vh;touch-action:none}
  .ui{position:fixed;pointer-events:none;z-index:5}
  .title{top:22px;left:24px}
  .title h1{margin:0;font-size:20px;font-weight:600;letter-spacing:.01em}
  .title .sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-top:4px}
  .title .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .hint{bottom:18px;left:0;right:0;text-align:center;font-size:12px;color:var(--muted)}
  .hint b{color:var(--ink);font-weight:600}
  #labels{position:fixed;inset:0;pointer-events:none;z-index:6}
  .lbl{position:absolute;transform:translate(-50%,-150%);white-space:nowrap;opacity:0}
  .lbl .nm{font-size:12px;color:#f3ece0;text-shadow:0 1px 5px rgba(0,0,0,.95),0 0 2px rgba(0,0,0,.9)}
  .lbl .ins{font-size:9.5px;color:var(--gold);text-shadow:0 1px 5px rgba(0,0,0,.95)}
  .lbl.sel .nm{font-size:15px;font-weight:600}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;letter-spacing:.1em;text-transform:uppercase;z-index:9}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading">Assembling the constellation…</div>
<div class="ui title"><h1 id="t-name">The Jazz Constellation</h1><div class="sub">who shaped whom</div><div class="lab">3D hologram prototype</div></div>
<div class="ui hint"><b>Drag</b> to orbit &middot; <b>Scroll / pinch</b> to zoom &middot; <b>tap / hover</b> a star to light its circle</div>
<div id="labels"></div>

<!-- reuse the exact curated data from the main app (registers window.GENRE_DATA) -->
<script src="../js/data/jazz.js"></script>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const G = (window.GENRE_DATA && window.GENRE_DATA.jazz) || null;
if(!G){ document.getElementById('loading').textContent = 'Data failed to load.'; throw new Error('no data'); }

/* ---------- lay the graph out in real 3D (a compact force settle) ---------- */
const nodes = G.nodes.map(n => ({ id:n.id, name:n.name, role:n.role, era:n.era, deg:0,
  x:(Math.random()-.5)*160, y:(Math.random()-.5)*160, z:(Math.random()-.5)*160, vx:0, vy:0, vz:0 }));
const byId = {}; nodes.forEach(n => byId[n.id]=n);
const edges = G.edges.filter(e => byId[e.a] && byId[e.b]).map(e => ({ s:byId[e.a], t:byId[e.b] }));
edges.forEach(e => { e.s.deg++; e.t.deg++; });
const adj = {}, nodeEdges = {};
nodes.forEach(n => { adj[n.id]=new Set(); nodeEdges[n.id]=[]; });
edges.forEach((e,i) => { adj[e.s.id].add(e.t.id); adj[e.t.id].add(e.s.id); nodeEdges[e.s.id].push(i); nodeEdges[e.t.id].push(i); });

(function settle(){
  const N = nodes.length, rep = 2600, link = 15, minD = 7;
  let alpha = 1;
  for(let it=0; it<360; it++){
    for(const a of nodes){ a.vx -= a.x*0.0016*alpha; a.vy -= a.y*0.0016*alpha; a.vz -= a.z*0.0016*alpha; }
    for(let i=0;i<N;i++){ const a=nodes[i];
      for(let j=i+1;j<N;j++){ const b=nodes[j];
        let dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z, d2=dx*dx+dy*dy+dz*dz||0.01, d=Math.sqrt(d2);
        let f=rep/d2; if(d<minD) f += (minD-d)*0.5/d;
        const fx=dx/d*f, fy=dy/d*f, fz=dz/d*f;
        a.vx+=fx; a.vy+=fy; a.vz+=fz; b.vx-=fx; b.vy-=fy; b.vz-=fz; } }
    for(const e of edges){ let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y, dz=e.t.z-e.s.z, d=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.01;
      const f=(d-link)*0.012, fx=dx/d*f, fy=dy/d*f, fz=dz/d*f;
      e.s.vx+=fx; e.s.vy+=fy; e.s.vz+=fz; e.t.vx-=fx; e.t.vy-=fy; e.t.vz-=fz; }
    for(const a of nodes){ a.vx*=0.85; a.vy*=0.85; a.vz*=0.85; a.x+=a.vx; a.y+=a.vy; a.z+=a.vz; }
    alpha *= 0.99;
  }
  for(const n of nodes){ n.bx=n.x; n.by=n.y; n.bz=n.z; n.phase=Math.random()*6.283;
    const u=Math.random(), v=Math.random(), th=Math.acos(2*u-1), ph=2*Math.PI*v;
    n.dx=Math.sin(th)*Math.cos(ph); n.dy=Math.sin(th)*Math.sin(ph); n.dz=Math.cos(th); }
})();

/* ---------- three.js scene ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05040a);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 4000);
camera.position.set(0, 26, 300);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.09;
controls.rotateSpeed = 0.65; controls.zoomSpeed = 1.35;
controls.enablePan = false;
controls.autoRotate = true; controls.autoRotateSpeed = 0.6;
controls.minDistance = 70; controls.maxDistance = 1100;
if(THREE.TOUCH) controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

let dragging = false, idleTimer = null;
controls.addEventListener('start', ()=>{ dragging=true; controls.autoRotate=false; clearTimeout(idleTimer); }); /* selection persists through a drag */
controls.addEventListener('end',   ()=>{ dragging=false; clearTimeout(idleTimer); idleTimer=setTimeout(()=>{ controls.autoRotate=true; }, 1600); });

function glowTexture(){
  const s=128, cv=document.createElement('canvas'); cv.width=cv.height=s;
  const ctx=cv.getContext('2d'), g=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.25,'rgba(255,255,255,0.55)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s); return new THREE.CanvasTexture(cv);
}
const GLOW = glowTexture();

(function stars(){
  const N=2200, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const r=900+Math.random()*1800, u=Math.random(), v=Math.random(), th=Math.acos(2*u-1), ph=2*Math.PI*v;
    pos[i*3]=r*Math.sin(th)*Math.cos(ph); pos[i*3+1]=r*Math.sin(th)*Math.sin(ph); pos[i*3+2]=r*Math.cos(th); }
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color:0xbfb9c9, size:2.2, sizeAttenuation:false, transparent:true, opacity:0.65 })));
})();

/* edges — additive lines with per-vertex colour so a star's ties can light up */
const EDGE_FAINT=[0.26,0.205,0.10], EDGE_BRIGHT=[1.0,0.80,0.42];
const edgePos=new Float32Array(edges.length*6), edgeCol=new Float32Array(edges.length*6);
let edgePosAttr, edgeColAttr;
(function lines(){
  edges.forEach((e,i)=>{ for(let k=0;k<2;k++){ edgeCol[i*6+k*3]=EDGE_FAINT[0]; edgeCol[i*6+k*3+1]=EDGE_FAINT[1]; edgeCol[i*6+k*3+2]=EDGE_FAINT[2]; } });
  const geo=new THREE.BufferGeometry();
  edgePosAttr=new THREE.BufferAttribute(edgePos,3); edgePosAttr.setUsage(THREE.DynamicDrawUsage); geo.setAttribute('position', edgePosAttr);
  edgeColAttr=new THREE.BufferAttribute(edgeCol,3); geo.setAttribute('color', edgeColAttr);
  scene.add(new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ vertexColors:true, transparent:true, opacity:0.95, blending:THREE.AdditiveBlending })));
})();

/* nodes — coloured core + glow halo, sized by degree */
const meshes=[], coreById={};
const eraColor = k => new THREE.Color((G.eras[k] && G.eras[k].color) || '#e0b15a');
nodes.forEach(n=>{
  const col = eraColor(n.era), r = 1.4 + Math.sqrt(n.deg)*0.7;
  const core = new THREE.Mesh(new THREE.SphereGeometry(r,16,16), new THREE.MeshBasicMaterial({ color:col }));
  core.userData = n; core.userData.baseR = r; scene.add(core); meshes.push(core); coreById[n.id]=core;
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map:GLOW, color:col, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.5 }));
  halo.scale.set(r*7, r*7, 1); scene.add(halo); n.halo = halo;
});

/* ---------- focus: light a star's ties, pop its circle, and NAME them ---------- */
const labelsBox=document.getElementById('labels');
let selected=null, focusLabels=[];
function setEdge(i,c){ const o=i*6; for(let k=0;k<2;k++){ edgeCol[o+k*3]=c[0]; edgeCol[o+k*3+1]=c[1]; edgeCol[o+k*3+2]=c[2]; } }
function mkLabel(core, isSel){
  const n=core.userData, el=document.createElement('div'); el.className='lbl'+(isSel?' sel':'');
  const nm=document.createElement('div'); nm.className='nm'; nm.textContent=n.name;
  const ins=document.createElement('div'); ins.className='ins'; ins.textContent=(n.role||'').split('·')[0].trim();
  el.appendChild(nm); el.appendChild(ins); labelsBox.appendChild(el);
  return { core, el, sel:isSel };
}
function setFocus(core){
  for(let i=0;i<edges.length;i++) setEdge(i, EDGE_FAINT);
  meshes.forEach(m=> m.scale.setScalar(1));
  focusLabels.forEach(o=> o.el.remove()); focusLabels=[];
  selected = core;
  if(core){
    const id=core.userData.id;
    (nodeEdges[id]||[]).forEach(i=> setEdge(i, EDGE_BRIGHT));
    core.scale.setScalar(2.1);
    focusLabels.push(mkLabel(core, true));
    [...(adj[id]||[])].forEach(nid=>{ const m=coreById[nid]; if(m){ m.scale.setScalar(1.6); focusLabels.push(mkLabel(m, false)); } });
  }
  edgeColAttr.needsUpdate=true;
}

const ray=new THREE.Raycaster(); const pointer=new THREE.Vector2();
function pick(cx, cy){ pointer.x=(cx/innerWidth)*2-1; pointer.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(pointer, camera); const hit=ray.intersectObjects(meshes,false)[0]; return hit?hit.object:null; }

/* desktop hover (throttled, skipped while dragging); touch uses tap below */
let lastRay=0;
canvas.addEventListener('pointermove', ev=>{
  if(dragging || ev.pointerType==='touch') return;
  const now=performance.now(); if(now-lastRay<55) return; lastRay=now;
  const m=pick(ev.clientX, ev.clientY);
  if(m!==selected) setFocus(m);
});
/* a tap (not a drag) toggles a star's circle — selection persists while you orbit */
let downX=0, downY=0, downT=0;
canvas.addEventListener('pointerdown', ev=>{ downX=ev.clientX; downY=ev.clientY; downT=performance.now(); });
canvas.addEventListener('pointerup', ev=>{
  if(Math.hypot(ev.clientX-downX, ev.clientY-downY)>9 || performance.now()-downT>320) return;
  const m=pick(ev.clientX, ev.clientY);
  setFocus(m && m!==selected ? m : null);
});

addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

document.getElementById('loading').style.display='none';
window.__holo={ setFocus, coreById, edgeCol, nodeEdges, EDGE_BRIGHT, camera, controls, get focusLabels(){return focusLabels;} };

/* ---------- render loop: living drift + projected focus labels ---------- */
const AMP=2.4, projV=new THREE.Vector3();
function loop(){
  requestAnimationFrame(loop);
  const t=performance.now()*0.00085;
  for(const core of meshes){ const n=core.userData, o=Math.sin(t+n.phase)*AMP;
    n.x=n.bx+n.dx*o; n.y=n.by+n.dy*o; n.z=n.bz+n.dz*o;
    core.position.set(n.x,n.y,n.z); n.halo.position.set(n.x,n.y,n.z); }
  for(let i=0;i<edges.length;i++){ const e=edges[i], o=i*6;
    edgePos[o]=e.s.x; edgePos[o+1]=e.s.y; edgePos[o+2]=e.s.z; edgePos[o+3]=e.t.x; edgePos[o+4]=e.t.y; edgePos[o+5]=e.t.z; }
  edgePosAttr.needsUpdate=true;
  for(const o of focusLabels){ projV.copy(o.core.position).project(camera);
    if(projV.z>1){ o.el.style.opacity=0; continue; }
    o.el.style.left=((projV.x*0.5+0.5)*innerWidth)+'px';
    o.el.style.top=((-projV.y*0.5+0.5)*innerHeight)+'px';
    o.el.style.opacity = o.sel?1:0.82;
  }
  controls.update();
  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
