<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reading room — the bookshelf (real covers)</title>
<style>
  :root{ color-scheme:dark; --gold:#e0b15a; --goldlt:#f0d99a; --ink:#f3ece0; --soft:#ddd3c6; --muted:#9a9182; }
  *{box-sizing:border-box}
  html,body{margin:0;background:#0f0a06;color:var(--ink);font-family:"Helvetica Neue",Arial,sans-serif}
  .room{min-height:100vh;background:
      radial-gradient(900px 600px at 78% -6%, rgba(224,177,90,.10), transparent 60%),
      linear-gradient(180deg,#1a120a,#0f0a06);
    padding:26px 30px 80px}
  header h1{font-size:18px;font-weight:600;margin:0 0 4px}
  header p{font-size:13px;color:var(--muted);margin:0 0 4px;max-width:700px;line-height:1.5}
  .pill{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:4px 12px;border-radius:999px;background:rgba(224,177,90,.16);color:var(--gold);margin-bottom:14px}
  .bookcase{position:relative;max-width:1100px;margin:18px auto 0}
  .case{position:relative;z-index:1}
  /* overhead lamp + raking light for relief */
  .wash{position:absolute;inset:-40px -10px 0;pointer-events:none;z-index:3;mix-blend-mode:screen;
    background:radial-gradient(1200px 780px at 93% 2%, rgba(255,228,172,.18), transparent 56%)}
  .shade{position:absolute;inset:0;pointer-events:none;z-index:3;
    background:linear-gradient(96deg, rgba(0,0,0,.5), rgba(0,0,0,.15) 32%, transparent 50%)}
  /* right-side picture light, mounted above the shelf, beam raking down-left */
  .lamp{position:absolute;top:-46px;right:3%;width:120px;height:0;pointer-events:none;z-index:4}
  .lamp .beam{position:absolute;top:42px;right:8px;width:280px;height:760px;transform-origin:top right;transform:rotate(26deg);
    background:linear-gradient(180deg,rgba(255,233,182,.5),rgba(255,219,146,.07) 52%,transparent 78%);
    mix-blend-mode:screen;filter:blur(7px);border-radius:46% 46% 0 0/60px}
  .lamp .arm{position:absolute;right:36px;top:0;width:3px;height:44px;background:linear-gradient(#3a2c1a,#241a10)}
  .lamp .head{position:absolute;right:0;top:42px;width:106px;height:22px;border-radius:12px/10px;transform:rotate(-9deg);
    background:linear-gradient(180deg,#3a2c1a,#180f08);box-shadow:0 7px 15px rgba(0,0,0,.5),inset 0 1px 0 rgba(202,168,94,.5)}
  .lamp .head::after{content:"";position:absolute;left:10%;right:10%;bottom:2px;height:5px;border-radius:4px;
    background:#ffe6a8;box-shadow:0 0 30px 12px rgba(255,224,150,.6)}

  .shelf{position:relative;margin-bottom:6px}
  .books{display:flex;align-items:flex-end;gap:5px;padding:0 14px;min-height:212px}
  .plank{height:16px;border-radius:2px;background:linear-gradient(180deg,#6b4a2a,#4a3018 55%,#321f0e);
    box-shadow:0 2px 0 rgba(0,0,0,.5),0 14px 22px rgba(0,0,0,.45),inset 0 2px 0 rgba(255,225,170,.18);margin:0 2px}

  .book{position:relative;height:206px;flex:0 0 auto;border-radius:2px 2px 1px 1px;cursor:pointer;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;padding:9px 0 8px;
    box-shadow:inset 2px 0 0 rgba(255,255,255,.12), inset -3px 0 5px rgba(0,0,0,.45), 1px 6px 12px rgba(0,0,0,.4);
    transition:transform .16s cubic-bezier(.2,.8,.2,1), box-shadow .16s, filter .16s;
    background:linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,0) 16%, rgba(0,0,0,.25) 86%, rgba(0,0,0,.4)), var(--c)}
  .book:hover{transform:translateY(-16px);filter:brightness(1.1);box-shadow:inset 2px 0 0 rgba(255,255,255,.16), inset -3px 0 5px rgba(0,0,0,.45), 0 18px 26px rgba(0,0,0,.55);z-index:8}
  .book .coverbg{position:absolute;inset:-8px;background-size:cover;background-position:center;filter:brightness(.6) saturate(1.05) blur(1px);z-index:0}
  .book .scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,rgba(18,11,4,.55),rgba(18,11,4,.12) 32%,rgba(0,0,0,.6))}
  .book .band,.book .title,.book .author,.book .foot{position:relative;z-index:2}
  .book .band{width:78%;height:0;border-top:2.5px solid rgba(224,184,110,.85);box-shadow:0 2px 0 rgba(0,0,0,.25);flex:0 0 auto}
  .book .title{flex:1 1 auto;min-height:0;writing-mode:vertical-rl;text-orientation:mixed;
    font:600 13.5px/1.05 Georgia,"Times New Roman",serif;color:var(--goldlt);letter-spacing:.4px;margin:10px 0;
    overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.85)}
  .book .author{writing-mode:vertical-rl;text-orientation:mixed;font:500 9.5px/1 Georgia,serif;
    color:rgba(240,217,154,.85);letter-spacing:.5px;max-height:88px;overflow:hidden;margin-bottom:4px;text-shadow:0 1px 2px rgba(0,0,0,.85)}
  .book .foot{font-size:7.5px;color:rgba(240,217,154,.7);letter-spacing:.5px;text-shadow:0 1px 2px rgba(0,0,0,.85)}
  .book.lean{transform:rotate(-3deg);transform-origin:bottom}
  .book.lean:hover{transform:translateY(-16px) rotate(-1deg)}

  .detail{position:fixed;inset:0;background:rgba(8,5,2,.66);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:30}
  .detail.open{opacity:1;pointer-events:auto}
  .card{position:relative;max-width:540px;width:100%;background:linear-gradient(180deg,#241809,#160f07);
    border:1px solid rgba(224,177,90,.34);border-radius:14px;padding:26px 28px;box-shadow:0 24px 70px rgba(0,0,0,.6);
    transform:translateY(10px) scale(.98);transition:transform .25s}
  .detail.open .card{transform:none}
  .ct{display:flex;gap:22px}
  .ct .cover{width:140px;flex:0 0 auto;border-radius:3px;box-shadow:0 10px 28px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.06);display:block}
  .ct .mini{width:120px;height:168px;border-radius:2px;flex:0 0 auto;position:relative;box-shadow:0 10px 28px rgba(0,0,0,.6),inset 2px 0 0 rgba(255,255,255,.12)}
  .ct .mini::before,.ct .mini::after{content:"";position:absolute;left:11%;right:11%;border-top:2px solid rgba(224,184,110,.8)}
  .ct .mini::before{top:16px}.ct .mini::after{bottom:16px}
  .card h2{font:600 22px/1.2 Georgia,serif;color:var(--ink);margin:0 0 2px}
  .card .sub{font:italic 15px/1.35 Georgia,serif;color:var(--soft);margin:0 0 10px}
  .card .by{font-size:14px;color:var(--gold);margin-bottom:2px}
  .card .yr{font-size:12.5px;color:var(--muted)}
  .card .note{font-size:13.5px;line-height:1.55;color:var(--soft);border-top:1px solid rgba(255,255,255,.1);padding-top:12px;margin-top:16px}
  .card .note b{color:var(--gold);font-weight:600}
  .card .find{display:inline-block;margin-top:16px;font-size:13px;color:var(--gold);text-decoration:none;border:1px solid rgba(224,177,90,.4);padding:8px 14px;border-radius:9px}
  .card .find:hover{background:rgba(224,177,90,.14)}
  .card .x{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
  .hint{font-size:12px;color:var(--muted);margin-top:18px}
  .hint b{color:var(--gold)}
</style>
</head>
<body>
<div class="room">
  <header>
    <span class="pill">The rooms · Reading</span>
    <h1>The reading shelf</h1>
    <p>Every book in the reading list as a spine — drawn from the book's <b>real cover</b> where one exists. Hover to lift one out; click to see the full cover and who wrote it. (Live jazz data + Open Library covers.)</p>
  </header>
  <div class="bookcase">
    <div class="lamp"><div class="beam"></div><div class="arm"></div><div class="head"></div></div>
    <div class="case" id="case"></div>
    <div class="wash"></div>
    <div class="shade"></div>
  </div>
  <p class="hint" id="hint">loading covers…</p>
</div>

<div class="detail" id="detail"><div class="card" id="card"></div></div>

<script src="../js/data/jazz.js"></script>
<script>
const PAL=['#6e2b2b','#2f4a39','#283a5a','#3a2a24','#6a4a2a','#4a2a44','#26474a','#5a3a1e','#34303a','#7a5a2e','#5a2236','#2e3a2a'];
const FALLBACK=[{name:"Gary Giddins",note:"Village Voice columnist.",books:[["Visions of Jazz: The First Century","1998"]]}];
const critics=(window.GENRE_DATA&&window.GENRE_DATA.jazz&&window.GENRE_DATA.jazz.critics)||FALLBACK;

const books=[];
critics.forEach(c=>(c.books||[]).forEach(b=>{
  const full=b[0]||"",year=b[1]||"",ci=full.indexOf(":");
  books.push({ main:(ci>0?full.slice(0,ci):full).trim(), sub:(ci>0?full.slice(ci+1):"").trim(),
    author:c.name, year, note:c.note||"", full, el:null, cover:null });
}));

const caseEl=document.getElementById('case'), hintEl=document.getElementById('hint');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const lastName=n=>n.replace(/\s*\(.*\)\s*/,'').trim();
const widthFor=b=>Math.min(54,Math.max(34,Math.round(32+b.main.length*0.85)));

function layout(){
  caseEl.innerHTML='';
  const avail=caseEl.clientWidth-32; let bk=null,used=0,idx=0;
  const newShelf=()=>{const sh=document.createElement('div');sh.className='shelf';
    const b=document.createElement('div');b.className='books';sh.appendChild(b);
    const p=document.createElement('div');p.className='plank';sh.appendChild(p);caseEl.appendChild(sh);used=0;return b;};
  bk=newShelf();
  books.forEach((b,i)=>{const w=widthFor(b);
    if(used+w+5>avail&&used>0)bk=newShelf(); used+=w+5;
    const el=document.createElement('div'); el.className='book'+((i%7===3)?' lean':'');
    el.style.setProperty('--c',PAL[idx++%PAL.length]); el.style.width=w+'px';
    el.innerHTML=`<div class="band"></div><div class="title">${esc(b.main)}</div><div class="author">${esc(lastName(b.author))}</div><div class="foot">${esc(b.year)}</div>`;
    el.onclick=()=>openBook(b); b.el=el;
    if(b.cover)applyCover(b);      // re-apply on relayout
    bk.appendChild(el);
  });
}
function applyCover(b){
  if(!b.el)return;
  b.el.classList.add('hascover');
  /* the cover IS the spine background (darkened for legibility); gold title sits on top */
  b.el.style.backgroundImage=`linear-gradient(rgba(12,8,3,.40),rgba(12,8,3,.40)), linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.06) 34%,rgba(0,0,0,.55)), url("${b.cover}")`;
  b.el.style.backgroundSize='cover,cover,cover';
  b.el.style.backgroundPosition='center,center,center';
  b.el.style.backgroundRepeat='no-repeat';
}

/* ---- cover lookup: Open Library (primary) -> Google Books (fallback), cached ---- */
function preload(url){return new Promise(res=>{const im=new Image();im.onload=()=>res(im.naturalWidth>2?url:null);im.onerror=()=>res(null);im.src=url;});}
async function findCover(b){
  const ck='olc:'+(b.full+'|'+b.author).toLowerCase();
  try{const c=localStorage.getItem(ck); if(c!==null)return c||null;}catch(e){}
  let url=null;
  try{const r=await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(b.main)}&author=${encodeURIComponent(b.author)}&limit=3&fields=cover_i`);
    const j=await r.json(); const d=(j.docs||[]).find(x=>x.cover_i);
    if(d){const u=`https://covers.openlibrary.org/b/id/${d.cover_i}-L.jpg?default=false`; url=await preload(u);}}catch(e){}
  if(!url){try{const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(b.main)}+inauthor:${encodeURIComponent(lastName(b.author))}&maxResults=1`);
    const j=await r.json(); const im=j.items&&j.items[0]&&j.items[0].volumeInfo&&j.items[0].volumeInfo.imageLinks;
    if(im){const u=(im.thumbnail||im.smallThumbnail||'').replace(/^http:/,'https:').replace('&edge=curl',''); if(u)url=await preload(u);}}catch(e){}}
  try{localStorage.setItem(ck,url||'');}catch(e){}
  return url;
}
async function loadCovers(){
  let i=0,found=0; const N=6;
  async function worker(){ while(i<books.length){ const b=books[i++]; const url=await findCover(b);
    if(url){ b.cover=url; found++; applyCover(b); } hintEl.innerHTML=`<b>${found}</b> of ${books.length} books with real covers · ${critics.length} writers — the rest keep the gilded spine.`; } }
  await Promise.all(Array.from({length:N},worker));
}

const detail=document.getElementById('detail'),card=document.getElementById('card');
function openBook(b){
  const q=encodeURIComponent(b.full+" "+b.author);
  const left=b.cover?`<img class="cover" src="${b.cover}" alt="${esc(b.main)} cover">`
    :`<div class="mini" style="background:linear-gradient(90deg,rgba(255,255,255,.12),rgba(0,0,0,.3) 90%),${PAL[b.main.length%PAL.length]}"></div>`;
  card.innerHTML=`<button class="x" onclick="closeBook()">&times;</button>
    <div class="ct">${left}<div><h2>${esc(b.main)}</h2>${b.sub?`<div class="sub">${esc(b.sub)}</div>`:''}
      <div class="by">${esc(b.author)}</div><div class="yr">${esc(b.year)}</div></div></div>
    <div class="note"><b>About the author —</b> ${esc(b.note)}</div>
    <a class="find" href="https://www.google.com/search?tbm=bks&q=${q}" target="_blank" rel="noopener">Find this book &#8599;</a>`;
  detail.classList.add('open');
}
function closeBook(){detail.classList.remove('open');}
detail.onclick=e=>{if(e.target===detail)closeBook();};
addEventListener('keydown',e=>{if(e.key==='Escape')closeBook();});
window.closeBook=closeBook;

layout(); loadCovers();
let rt; addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(layout,150);});
</script>
</body>
</html>
