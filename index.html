<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Music Constellation — an encyclopedia of who shaped whom</title>
<meta name="description" content="Interactive 3D maps of music history: jazz, hip hop, and reggae as constellations of the musicians who shaped one another — with live discographies, photos, and 30-second previews." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 61,38 96,38 68,59 78,93 50,72 22,93 32,59 4,38 39,38' fill='%23e0b15a'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/style.css?v=2026-06-14.48" />
<!-- resolves three.js for the optional 3D view; nothing loads until 3D is entered -->
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>
<canvas id="holoc"></canvas><div id="holabels"></div>

<div class="topbar">
  <div class="brand">
    <h1 id="gname">The Music Constellation <span class="ver" id="ver"></span></h1>
    <div class="tag">The Music Constellation<span class="tagx"> &middot; who shaped whom</span></div>
  </div>
  <nav class="gtabs" id="gtabs" aria-label="Choose a genre"></nav>
  <button class="rr" id="chordBtn">Chord web</button>
  <button class="rr" id="holoBtn" title="A 3D view of the constellation">3D</button>
  <button class="rr" id="rrBtn">Rooms</button>
  <button class="rr" id="fitBtn">Fit to screen</button>
  <button class="rr" id="posterBtn" title="Download a high-resolution poster">Poster</button>
  <select class="instr" id="instr" aria-label="Filter the constellation"></select>
  <div class="search">
    <input id="q" type="text" placeholder="Find an artist…" autocomplete="off" />
    <div class="suggest" id="suggest"></div>
  </div>
</div>

<div class="legend" id="legend"></div>
<div class="hint"><b>Hover</b> to trace ties &middot; <b>Click</b> for a card &middot; <b>Double-click</b> for the full page<br><b>Drag</b> to spin the globe &middot; <b>Scroll</b> to zoom in for photos</div>
<div class="spread"><span>Tight</span><input id="spread" type="range" min="0.7" max="3.4" step="0.05" value="1.5" aria-label="Spread the network out" /><span>Spread</span></div>
<div id="clipnote" class="clipnote"><canvas id="clipwave" class="clipwave" width="56" height="18" aria-hidden="true"></canvas><span id="clipnotetext"></span></div>

<aside class="panel" id="panel"><button class="close" id="close">&times;</button><div id="panelBody"></div></aside>
<div class="page" id="page"><div class="page-inner" id="pageInner"></div></div>

<noscript><p style="padding:40px;font-family:sans-serif">The Music Constellation needs JavaScript to draw its sky.</p></noscript>
<script>
/* ---------------------------------------------------------------------------
   WHITE-LABEL CONFIG. These defaults reproduce the public site exactly. A
   branded or institutional deployment overrides them — a museum, a label, a
   course — to set the name, palette, which datasets show, and kiosk mode.
   See docs/WHITE-LABEL.md. Leave as-is for the flagship public site.
   --------------------------------------------------------------------------- */
window.MC_CONFIG={
  brand:"The Music Constellation",  /* sub-title + browser-tab name           */
  tagline:"who shaped whom",        /* the line after the brand               */
  genres:null,                      /* null = all; or e.g. ["jazz"] for one   */
  showTabs:true,                    /* genre switcher (auto-hidden if 1 set)   */
  accent:null,                      /* optional hex to retint the gold accent  */
  attribution:null,                 /* optional credit, e.g. "An exhibit by …" */
  kiosk:false,                      /* fullscreen attract-loop (museum installs)*/
};
/* Demos & installs can override the config from the URL without a separate
   build, e.g. ?brand=Blue+Note&genres=jazz&tabs=0&accent=%231e63b0&kiosk=1 */
(function(s){if(!s)return;var p=new URLSearchParams(s),C=window.MC_CONFIG;
  if(p.has("brand"))C.brand=p.get("brand");
  if(p.has("tagline"))C.tagline=p.get("tagline");
  if(p.has("genres"))C.genres=p.get("genres").split(",").filter(Boolean);
  if(p.has("tabs"))C.showTabs=p.get("tabs")!=="0";
  if(p.has("accent"))C.accent=p.get("accent");
  if(p.has("attribution"))C.attribution=p.get("attribution");
  if(p.has("kiosk"))C.kiosk=p.get("kiosk")==="1";
})(location.search);
/* Single source of truth for the build. Bump this (and the css/style.css?v=
   above — the validator enforces they match) on any notable change, and every
   asset URL below changes with it, so a normal reload always fetches fresh —
   no hard-refresh needed, on any device. */
window.MC_BUILD="2026-06-14.48";
["js/collab.js","js/data/jazz.js","js/data/hiphop.js","js/data/reggae.js","js/holo.js","js/engine.js"].forEach(function(src){
  var s=document.createElement("script");s.src=src+"?v="+window.MC_BUILD;s.async=false;document.head.appendChild(s);
});
</script>
</body>
</html>
